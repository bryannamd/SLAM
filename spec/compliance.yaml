# compliance.yaml — 권한·개인정보·출시 블로커. validate --gate launch가 blockers 전부 resolved를 요구.
# 채워진 예시: examples/sip-reminder/spec/compliance.yaml
# audience: minors 이면 minors 섹션(coppa 등)이 필수.

permissions: []            # 필요한 권한만 추가 { name, when, reason }. 없으면 빈 리스트 유지.

privacy:
  collects_pii: false
  privacy_policy_url: "TODO"   # 유효한 URL로 교체(스토어 필수)
  terms_url: "TODO"

minors:
  applicable: false
  coppa: "N/A — 일반 대상"
  parental_consent: "N/A"
  behavioral_ads_restricted: "N/A"

# 출시 블로커 — Launch 게이트에서 전부 resolved: true 여야 한다(지금은 미완료)
blockers:
  - id: privacy_policy
    desc: "개인정보 처리방침 URL 유효"
    resolved: false
  - id: terms
    desc: "이용약관 URL 유효"
    resolved: false
  - id: apple_privacy_labels
    desc: "App Privacy 라벨 정확 작성"
    resolved: false
  - id: play_data_safety
    desc: "Google Play 데이터 안전 섹션 정확 작성"
    resolved: false

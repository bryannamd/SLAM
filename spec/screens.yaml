      empty:    { ui: "TODO", copy: "TODO" }
      error:    { ui: "TODO", copy: "TODO" }
      success:  { ui: "TODO", copy: "TODO" }
      offline:  { na: "TODO — 해당 없으면 사유, 아니면 ui로 교체" }

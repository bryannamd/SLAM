# metrics.yaml — 성공·성장 지표 타겟. product는 events.yaml 이벤트로 측정 가능해야 한다.
# client는 모바일 고유 지표(서버 지표 대신). 채워진 예시: examples/sip-reminder/spec/metrics.yaml

product:
  - key: d1_retention
    target: "40%+"
    uses: [app_open]
  # 핵심 가치 지표를 앱에 맞게 추가(uses에 events.yaml 이벤트 지정)

client:
  - key: cold_start
    target: "< 2s"
  - key: crash_free_sessions
    target: "> 99.5%"

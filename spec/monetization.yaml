# monetization.yaml — 수익 모델·가격. model은 manifest.monetization_model과 일치해야 한다.
# 기본은 free(수익화 없음). 유료로 가면 examples/sip-reminder/spec/monetization.yaml 참고해 채운다.

model: free                # manifest.monetization_model과 동일하게 유지

free_features:
  - "핵심 기능 전부"
paid_features: []
paywall_trigger: "없음(free)"

# 유료(freemium/subscription/iap/ads)로 전환 시 아래를 채운다:
# pricing: { currency, base_price, model_type, free_trial }
# unit_economics: { store_fee, monthly_opex, rule: "LTV > 3 x CAC" }
# aso: { app_name, keywords, screenshot_hook }

# events.yaml — 분석 이벤트 SSOT. app_open은 범용 기본값. 앱 고유 이벤트를 추가한다.
# 채워진 예시: examples/sip-reminder/spec/events.yaml
# metrics.yaml의 uses가 여기 이벤트를 참조한다(validate가 정합성 검사).

events:
  - name: app_open
    trigger: "앱 실행"
    props: [os, version]
  # 추가 예: sign_up_completed, <core_action>_done, purchase_completed, error_occurred ...

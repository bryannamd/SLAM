# architecture.yaml — 기술 스택·보안·롤백. 스택은 초기 1회 확정.
# 채워진 예시: examples/sip-reminder/spec/architecture.yaml
# backend: false면 서버/openapi 섹션 생략. true면 spec/openapi.yaml(OpenAPI 3)을 원천으로.

stack:
  framework: "TODO"        # 모바일: Flutter 3.x / React Native · 웹: Next.js / React / SvelteKit
  language: "TODO"         # 예: Dart / TypeScript
  state: "TODO"            # 예: Riverpod / Zustand / Redux
  local_db: "TODO"         # 모바일: Drift(SQLite) · 웹: Postgres / IndexedDB / 없음
  backend: "none"          # none | firebase | supabase | custom
  ci: "GitHub Actions"

commands:                  # 코드 게이트 명령 — 스택 확정 시 채운다(/verify·/build-screen이 실행)
  analyze: "TODO"          # 모바일: flutter analyze · 웹: eslint / tsc --noEmit
  format: "TODO"           # 모바일: dart format --set-exit-if-changed . · 웹: prettier --check .
  test: "TODO"             # 모바일: flutter test · 웹: vitest run / jest

layers:                    # 의존 방향: presentation → domain → data (역방향 금지)
  presentation: "화면·위젯"
  domain: "유스케이스·엔티티(순수)"
  data: "DB·리포지토리"

environments: [dev, staging, prod]

security:
  secrets: "키 하드코딩 금지, 민감값은 안전 저장소(모바일 Keychain/Keystore · 웹 서버 환경변수/시크릿 매니저)"
  input_validation: "모든 사용자 입력 검증"
  transport: "네트워크 사용 시 HTTPS 강제"

rollback:
  triggers:
    - "crash-free < 99%"
    - "P0 버그 2건 이상"
    - "데이터 손상"
  methods:
    - "단계적 배포 일시중지"
    - "이전 빌드 재배포"
    - "원격 설정으로 문제 기능 OFF"

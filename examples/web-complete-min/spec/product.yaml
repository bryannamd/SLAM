# product.yaml — PRD + IA/Flow
# web-complete-min: 화면 2개(bookmarks, tags)로 이루어진 최소 MVP.

goal: "계정 없이도 북마크를 태그로 정리해 원하는 링크를 10초 안에 다시 찾게 돕는다"

scenarios:
  - name: "북마크 추가하고 태그로 찾기"
    steps:
      - "사용자가 페이지를 열면"
      - "저장된 북마크가 없으면 추가 폼이 바로 보이고"
      - "URL·제목·태그를 입력해 저장하면 목록에 즉시 표시되고"
      - "태그를 눌러 필터링하면 해당 태그의 북마크만 남는다"

features:
  p0:
    - "북마크 추가(URL·제목·태그)"
    - "북마크 목록 조회·삭제"
    - "태그별 필터링"

out_of_scope:
  - "여러 기기 동기화(계정/서버 필요)"
  - "브라우저 북마크 파일 가져오기·내보내기"
  - "폴더 계층 구조"

ia:
  - "북마크 목록(홈)"
  - "태그 관리"

flows:
  - name: "핵심 정리"
    path: "북마크 목록 → 추가 폼 → 저장 → 태그 필터 → 원하는 링크 확인"

edge_cases:
  - situation: "localStorage 저장 공간 초과 또는 쓰기 실패"
    handling: "에러 카드 + 재시도 버튼, 입력 내용은 유지"
  - situation: "존재하지 않는 경로로 직접 접근(북마크 삭제된 뒤 새로고침 등)"
    handling: "route_404 안내 화면 + 목록으로 돌아가기 링크"
  - situation: "URL 형식이 아닌 값 입력"
    handling: "저장 전 클라이언트 검증으로 즉시 안내, 저장 자체는 막음"

assumptions:
  - "사용자는 계정 없이 한 브라우저에서만 사용하는 제약을 받아들인다"
  - "MVP는 오프라인 로컬 저장(localStorage)만 사용하고 서버가 없다"

# architecture.yaml — 기술 아키텍처
# backend: false — 서버·API 섹션 없음. deploy_target: web_host(정적 호스팅).

stack:
  framework: "React 18 + Vite"
  language: "TypeScript"
  state: "React useState + localStorage"
  local_db: "localStorage"
  notifications: "없음(웹 푸시 미사용)"
  backend: "none"
  ci: "GitHub Actions"

commands:
  analyze: "tsc --noEmit"
  format: "prettier --check ."
  test: "vitest run"

layers:
  presentation: "화면·컴포넌트 (BookmarksScreen.tsx, TagsScreen.tsx)"
  domain: "유스케이스·엔티티(순수 TypeScript)"
  data: "localStorage 리포지토리, 이벤트 로깅(analytics.ts)"

environments: [dev, staging, prod]

security:
  secrets: "코드에 키 하드코딩 금지, 클라이언트 전용 앱이라 서버 비밀값 없음"
  input_validation: "모든 사용자 입력 검증(URL 형식·빈 문자열·길이 제한)"
  transport: "정적 호스팅 HTTPS 강제, 외부 API 호출 없음(오프라인 로컬 전용)"

rollback:
  triggers:
    - "배포 후 콘솔 에러율 급증"
    - "P0 버그 2건 이상"
    - "localStorage 데이터 손상 리포트"
  methods:
    - "이전 정적 빌드로 즉시 롤백(호스팅 플랫폼 배포 히스토리)"
    - "CDN 캐시 무효화 후 재배포"

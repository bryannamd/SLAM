# product.yaml — PRD + IA/Flow
# _complete-min: 화면 1개(home)만 있는 최소 MVP.

goal: "출시 30일 안에 사용자가 매일 한 줄 메모를 남기는 습관을 갖도록 돕는다"

scenarios:
  - name: "오늘 한 줄 남기기"
    steps:
      - "사용자가 앱을 열면"
      - "오늘 메모가 없으면 입력창이 바로 보이고"
      - "한 줄을 쓰고 저장하면 저장된 메모가 화면에 표시된다"

features:
  p0:
    - "오늘 한 줄 메모 작성"
    - "오늘 메모 조회·수정"
    - "저녁 리마인더 알림(로컬)"

out_of_scope:
  - "계정/로그인(오프라인 로컬만)"
  - "여러 줄·긴 글 작성"
  - "메모 검색·태그·과거 이력 조회"

ia:
  - "홈(오늘 한 줄)"

flows:
  - name: "핵심 기록"
    path: "홈 → 한 줄 입력 → 저장 → 오늘 메모 표시"

edge_cases:
  - situation: "알림 권한 거부"
    handling: "홈 상단 배너로 권한 재요청 안내(앱은 계속 동작)"
  - situation: "저장 실패(로컬 DB 쓰기 오류)"
    handling: "에러 카드 + 재시도 버튼, 입력 내용은 유지"
  - situation: "기기 시간 변경/자정 넘김"
    handling: "일자 롤오버 처리, 새 날짜의 메모는 empty로 시작"

assumptions:
  - "사용자는 하루에 한 줄만 남기는 제약을 받아들인다"
  - "MVP는 오프라인 로컬 동작(서버 없음)"

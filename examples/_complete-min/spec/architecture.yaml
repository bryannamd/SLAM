# architecture.yaml — 기술 아키텍처
# backend: false — 서버·API 섹션 없음.

stack:
  framework: "Flutter 3.x"
  language: "Dart"
  state: "Riverpod"
  local_db: "Drift (SQLite)"
  notifications: "flutter_local_notifications"
  backend: "none"
  ci: "GitHub Actions"

commands:
  analyze: "flutter analyze"
  format: "dart format --set-exit-if-changed ."
  test: "flutter test"

layers:
  presentation: "화면·위젯 (home_screen.dart)"
  domain: "유스케이스·엔티티(순수 Dart)"
  data: "로컬 DB·리포지토리, 이벤트 로깅(analytics.dart)"

environments: [dev, staging, prod]

security:
  secrets: "코드에 키 하드코딩 금지, 민감값은 Keychain/Keystore"
  input_validation: "모든 사용자 입력 검증(빈 문자열·길이 제한)"
  transport: "네트워크 미사용(오프라인 로컬 전용)"

rollback:
  triggers:
    - "crash-free < 99%"
    - "P0 버그 2건 이상"
    - "데이터 손상"
  methods:
    - "단계적 배포 일시중지(Play staged rollout / App Store phased release)"
    - "이전 빌드 재배포"
